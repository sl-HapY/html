name: cleanup

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target to clean'
        required: true
        type: choice
        options:
          - all
          - youtube
          - soundcloud
          - direct
          - mhtml
          - pornhub
          - search
          - old_files
      older_than_days:
        description: 'Delete files older than (days) - only for old_files mode'
        required: false
        default: '30'
        type: string
      mode:
        description: 'Clean Mode'
        required: true
        type: choice
        options:
          - safe
          - aggressive

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Execute Cleanup
        run: |
          TARGET="${{ github.event.inputs.target }}"
          MODE="${{ github.event.inputs.mode }}"
          DAYS="${{ github.event.inputs.older_than_days }}"

          if [[ "$TARGET" == "all" ]]; then
            if [[ "$MODE" == "aggressive" ]]; then
              rm -rf downloads/*
            else
              find downloads -type f \( -name "*.mp4" -o -name "*.mp3" -o -name "*.m4a" -o -name "*.7z*" -o -name "*.mhtml" \) -delete
            fi
          elif [[ "$TARGET" == "old_files" ]]; then
            find downloads -type f -mtime +$DAYS -delete
          else
            if [[ "$MODE" == "aggressive" ]]; then
              rm -rf "downloads/$TARGET"/*
            else
              find "downloads/$TARGET" -type f -delete 2>/dev/null || true
            fi
          fi

          echo "Cleanup completed (Mode: $MODE, Target: $TARGET)"

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Cleanup: ${{ github.event.inputs.target }} (${{ github.event.inputs.mode }})" || echo "Nothing to commit"
          git push
