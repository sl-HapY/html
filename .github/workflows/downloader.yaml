name: search

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform'
        required: true
        type: choice
        options:
          - youtube
          - youtube_music
          - soundcloud
          - pornhub
      query:
        description: 'Search Query'
        required: true
        type: string

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup
        run: |
          sudo apt-get install -y python3-pip jq
          pip3 install --quiet yt-dlp

      - name: Search
        run: |
          mkdir -p downloads/search
          cd downloads/search

          case "${{ github.event.inputs.platform }}" in
            "youtube")
              yt-dlp --flat-playlist --dump-json "ytsearch30:${{ github.event.inputs.query }}" > results.jsonl
              jq -r '"# YouTube Search: ${{ github.event.inputs.query }}\n\n| # | Title | Duration | Channel | URL |\n|---|---|---|---|---|", 
              (.[0:25] | .[] | "| \(.index // 0) | \(.title) | \(.duration_string // \"-\") | \(.uploader // \"-\") | [Watch](https://youtube.com/watch?v=\(.id)) |")' results.jsonl > "youtube_${{ github.event.inputs.query | replace(" ", "_") }}.md"
              ;;
            "youtube_music")
              yt-dlp --flat-playlist --dump-json "ytsearch30:${{ github.event.inputs.query }} music" > results.jsonl
              jq -r '"# YouTube Music Search: ${{ github.event.inputs.query }}\n\n| # | Title | Duration | Channel | URL |\n|---|---|---|---|---|", 
              (.[0:25] | .[] | "| \(.index // 0) | \(.title) | \(.duration_string // \"-\") | \(.uploader // \"-\") | [Listen](https://youtube.com/watch?v=\(.id)) |")' results.jsonl > "music_${{ github.event.inputs.query | replace(" ", "_") }}.md"
              ;;
            "soundcloud")
              yt-dlp --flat-playlist --dump-json "soundcloudsearch15:${{ github.event.inputs.query }}" > results.jsonl
              jq -r '"# SoundCloud Search: ${{ github.event.inputs.query }}\n\n| # | Title | Duration | User | URL |\n|---|---|---|---|---|", 
              (.[0:20] | .[] | "| \(.index // 0) | \(.title) | \(.duration_string // \"-\") | \(.uploader // \"-\") | [Link](\(.url)) |")' results.jsonl > "soundcloud_${{ github.event.inputs.query | replace(" ", "_") }}.md"
              ;;
            "pornhub")
              yt-dlp --flat-playlist --dump-json "pornhubsearch15:${{ github.event.inputs.query }}" > results.jsonl 2>/dev/null || true
              jq -r '"# Pornhub Search: ${{ github.event.inputs.query }}\n\n| # | Title | Duration | URL |\n|---|---|---|---|", 
              (.[0:20] | .[] | "| \(.index // 0) | \(.title) | \(.duration_string // \"-\") | [Link](\(.url)) |")' results.jsonl > "pornhub_${{ github.event.inputs.query | replace(" ", "_") }}.md"
              ;;
          esac

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/search/
          git commit -m "Search completed: ${{ github.event.inputs.platform }}" || echo "No changes"
          git push
