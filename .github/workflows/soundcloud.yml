name: git-get-soundcloud

on:
  workflow_dispatch:
    inputs:
      input:
        description: 'URL or Search Term'
        required: true
        type: string

permissions:
  contents: write

jobs:
  soundcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip ffmpeg rar
          pip3 install --upgrade yt-dlp

      - name: Process
        env:
          INPUT: ${{ inputs.input }}
        run: |
          mkdir -p soundcloud
          if [[ "$INPUT" =~ ^https?:// ]]; then
            yt-dlp -f bestaudio --extract-audio --audio-format mp3 \
              --output "soundcloud/%(artist)s - %(title)s.%(ext)s" "$INPUT"
          else
            yt-dlp --flat-playlist -j "scsearch50:$INPUT" | while read -r line; do
              url=$(echo "$line" | jq -r '.url')
              yt-dlp -f bestaudio --extract-audio --audio-format mp3 \
                --output "soundcloud/%(artist)s - %(title)s.%(ext)s" "$url"
            done
          fi

      - name: Split > 95MB
        run: |
          cd soundcloud
          find . -name "*.mp3" | while read f; do
            if [ $(stat -c%s "$f") -gt 99614720 ]; then
              rar a -v90m -m5 -ep1 "${f%.*}.rar" "$f" && rm "$f"
            fi
          done

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add soundcloud/
          git commit -m "git-get: soundcloud" || echo "No changes"
          git push
