name: git-get-pornhub

on:
  workflow_dispatch:
    inputs:
      input:
        description: 'URL or Search Term'
        required: true
        type: string

permissions:
  contents: write

jobs:
  pornhub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip rar bc
          pip3 install yt-dlp

      - name: Process
        env:
          INPUT: ${{ inputs.input }}
        run: |
          mkdir -p pornhub
          if [[ "$INPUT" =~ ^https?:// ]]; then
            yt-dlp --no-check-certificate \
              --format "bestvideo[height<=1080]+bestaudio/best[ext=mp4]/best" \
              --merge-output-format mp4 \
              --output "pornhub/%(uploader)s - %(title)s - %(id)s.%(ext)s" \
              "$INPUT"
          else
            yt-dlp --flat-playlist -j "pornhubsearch:$INPUT" | while read -r line; do
              url=$(echo "$line" | jq -r '.webpage_url // .url')
              yt-dlp --no-check-certificate \
                --format "bestvideo[height<=1080]+bestaudio/best[ext=mp4]/best" \
                --merge-output-format mp4 \
                --output "pornhub/%(uploader)s - %(title)s - %(id)s.%(ext)s" \
                "$url"
            done
          fi

      - name: Split > 95MB
        run: |
          cd pornhub
          find . -name "*.mp4" | while read f; do
            if [ $(stat -c%s "$f") -gt 99614720 ]; then
              rar a -v90m -m5 -ep1 "${f%.*}.rar" "$f" && rm "$f"
            fi
          done

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pornhub/
          git commit -m "git-get: pornhub" || echo "No changes"
          git push
