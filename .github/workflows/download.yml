name: Multi Downloader

on:
  workflow_dispatch:
    inputs:
      commands:
        description: 'Commands (one per line): wget <url> [o=name] / git <url> [b=branch] [d=dest] [lfs=true] [depth=1] / mirror <url> [o=outdir] [depth=1000]'
        required: true
        type: string
        default: |
          wget https://filesamples.com/samples/document/txt/sample1.txt
      out_zip:
        description: 'Output ZIP name'
        required: false
        type: string
        default: 'out.zip'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
      - name: Run
        env:
          CMDS: ${{ github.event.inputs.commands }}
          ZIP: ${{ github.event.inputs.out_zip }}
        run: python downloader.py
      - uses: actions/upload-artifact@v4
        with:
          name: result
          path: ${{ github.event.inputs.out_zip }}
