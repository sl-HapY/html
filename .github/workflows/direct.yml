name: git-get-direct

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Direct Download URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  direct:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup
        run: sudo apt-get install -y aria2 rar

      - name: Download
        run: |
          mkdir -p direct
          FILENAME=$(basename "${{ inputs.url }}" | cut -d'?' -f1 | sed 's/[^a-zA-Z0-9._()-]/_/g')
          aria2c --split=8 --max-connection-per-server=4 --min-split-size=20M \
            --dir=direct --out="$FILENAME" "${{ inputs.url }}"

      - name: Split > 95MB
        run: |
          cd direct
          find . -type f | while read f; do
            if [ $(stat -c%s "$f") -gt 99614720 ]; then
              rar a -v90m -m5 -ep1 "${f%.*}.rar" "$f" && rm "$f"
            fi
          done

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add direct/
          git commit -m "git-get: direct" || echo "No changes"
          git push
